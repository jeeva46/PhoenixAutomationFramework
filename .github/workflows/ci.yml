name: Phoenix Automation Framework

on:
  push:
    branches: [ "master","feature/r7-create-job-api" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:
    inputs:
      env:
        description: Environment
        type: choice
        options:
          - qa
          - dev
          - uat
        default: qa
        required: true

      suiteXmlFile:
        description: TestNG SuiteFile
        type: choice
        options:
          - testng.xml
          - e2e.xml
        default: testng.xml
        required: true
          
    

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: default value for execution
      id: default
      run: |
        echo "suiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng.xml' }}" >> $GITHUB_OUTPUT
        echo "env=${{ github.event.inputs.env || 'qa' }}" >> $GITHUB_OUTPUT
    
    - name: To run the Automation framework
      run: mvn test -Denv="${{ steps.default.outputs.env }}" -DsuiteXmlFile="${{ steps.default.outputs.suiteXmlFile }}"


    - name: upload build artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Maven sure fire report
        path: target/surefire-reports/
        retention-days: 10

   










